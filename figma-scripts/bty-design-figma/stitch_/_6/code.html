</div>

</div>
<!-- Subject Overlay Selection (Simulated) -->
<div class="absolute inset-0 z-20 flex items-center justify-center">
<div class="w-3/4 h-3/4 border-2 border-primary rounded-xl bg-primary/5 backdrop-blur-[2px] flex items-center justify-center animate-pulse-soft">
<div class="absolute -top-3 -left-3 bg-primary text-on-primary text-[10px] px-2 py-1 rounded-sm">SUBJECT_01</div>
</div>
</div>
<!-- Interaction Hints -->
<div class="absolute bottom-6 left-6 right-6 z-30 flex justify-between items-end">
<div class="glass-effect bg-white/40 border border-white/50 px-4 py-2 rounded-2xl text-on-surface text-[12px]">
<span class="font-bold">Detected:</span> 2 Elements

<div class="w-12 h-12 glass-effect bg-primary/80 flex items-center justify-center rounded-full text-white active:scale-90 transition-all cursor-pointer">

<button class="flex-[1.5] h-14 rounded-lg gradient-primary text-white font-headline-md text-[16px] shadow-lg shadow-primary/20 active:scale-95 transition-all">

<style>
        @keyframes scan {
            0% { top: 0%; }
            50% { top: 100%; }
            100% { top: 0%; }
        }
    </style>
<script>
        // Micro-interactions for button selection
        const candidateButtons = document.querySelectorAll('main button');
        candidateButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                candidateButtons.forEach(b => {
                    b.classList.remove('border-primary', 'verdant-shadow');
                    b.classList.add('border-transparent');
                    const check = b.querySelector('.material-symbols-outlined.text-white');
                    if(check) {
                        check.parentElement.classList.remove('bg-primary', 'border-primary');
                        check.parentElement.classList.add('border-outline-variant');
                        check.remove();
                    }
                });
                
                btn.classList.add('border-primary', 'verdant-shadow');
                btn.classList.remove('border-transparent');
                
                const indicator = btn.querySelector('div:last-child');
                indicator.classList.remove('border-outline-variant');
                indicator.classList.add('bg-primary', 'border-primary');
                indicator.innerHTML = '<span class="material-symbols-outlined text-white text-[16px]" style="font-variation-settings: \'wght\' 700;">check</span>';
            });
        });
    </script>
