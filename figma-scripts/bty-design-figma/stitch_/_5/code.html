<script>
        // Simple micro-interactions
        document.querySelectorAll('button').forEach(button => {
            button.addEventListener('mousedown', () => {
                button.classList.add('scale-95');
            });
            button.addEventListener('mouseup', () => {
                button.classList.remove('scale-95');
            });
            button.addEventListener('mouseleave', () => {
                button.classList.remove('scale-95');
            });
        });

        // Image tilt hover effect logic
        const heroImg = document.querySelector('.hero-beverage-container');
        if(heroImg) {
            heroImg.addEventListener('mousemove', (e) => {
                const { left, top, width, height } = heroImg.getBoundingClientRect();
                const x = (e.clientX - left) / width;
                const y = (e.clientY - top) / height;
                const tiltX = (y - 0.5) * 10;
                const tiltY = (x - 0.5) * -10;
                heroImg.style.transform = `perspective(1000px) rotateX(${tiltX}deg) rotateY(${tiltY}deg)`;
            });
            heroImg.addEventListener('mouseleave', () => {
                heroImg.style.transform = `perspective(1000px) rotateX(0deg) rotateY(0deg) rotate(-3deg)`;
            });
        }
    </script>
