<!DOCTYPE html>

<html class="light" lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>

<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

        theme: {

            "colors": {

                    "secondary": "#006d32",
                    "inverse-on-surface": "#f0f1f1",
                    "on-secondary": "#ffffff",
                    "error": "#ba1a1a",
                    "surface-container": "#eeeeee",
                    "tertiary-fixed-dim": "#97d2c9",
                    "primary-container": "#008379",
                    "tertiary-fixed": "#b3eee5",
                    "on-primary-fixed": "#00201d",
                    "on-tertiary-container": "#f4fffc",
                    "surface-container-low": "#f3f3f3",
                    "on-error-container": "#93000a",
                    "inverse-surface": "#2f3131",
                    "surface-container-highest": "#e2e2e2",
                    "secondary-container": "#4dfe8a",
                    "inverse-primary": "#68d8cc",
                    "surface-variant": "#e2e2e2",
                    "on-secondary-fixed-variant": "#005224",
                    "surface-container-lowest": "#ffffff",
                    "primary": "#006860",
                    "outline": "#6d7a77",
                    "on-secondary-container": "#007235",
                    "on-primary-container": "#f3fffc",
                    "surface-container-high": "#e8e8e8",
                    "on-background": "#1a1c1c",
                    "outline-variant": "#bcc9c6",
                    "surface": "#f9f9f9",
                    "background": "#f9f9f9",
                    "on-surface-variant": "#3d4947",
                    "on-primary": "#ffffff",
                    "on-tertiary": "#ffffff",
                    "primary-fixed-dim": "#68d8cc",
                    "surface-dim": "#dadada",
                    "on-tertiary-fixed": "#00201d",
                    "surface-bright": "#f9f9f9",
                    "on-surface": "#1a1c1c",
                    "on-secondary-fixed": "#00210b",
                    "primary-fixed": "#86f5e8",
                    "error-container": "#ffdad6",
                    "surface-tint": "#006a62",
                    "on-primary-fixed-variant": "#00504a",
                    "on-error": "#ffffff",
                    "on-tertiary-fixed-variant": "#0e4f49",
                    "secondary-fixed": "#64ff92",
                    "secondary-fixed-dim": "#23e373"
            },
            "borderRadius": {
                    "DEFAULT": "1rem",
                    "lg": "2rem",
                    "xl": "3rem",
                    "full": "9999px"
            },
            "spacing": {
                    "container-padding-desktop": "40px",
                    "stack-sm": "8px",
                    "stack-lg": "48px",
                    "gutter": "16px",
                    "stack-md": "24px",
                    "unit": "4px",
                    "container-padding-mobile": "20px"
            },
            "fontFamily": {
                    "body-md": ["Plus Jakarta Sans"],
                    "display-lg": ["Plus Jakarta Sans"],
                    "headline-md": ["Plus Jakarta Sans"],
                    "label-sm": ["Plus Jakarta Sans"],
                    "body-lg": ["Plus Jakarta Sans"],
                    "display-lg-mobile": ["Plus Jakarta Sans"]
            },
            "fontSize": {
                    "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                    "display-lg": ["48px", {"lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                    "headline-md": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],
                    "label-sm": ["13px", {"lineHeight": "18px", "letterSpacing": "0.05em", "fontWeight": "600"}],
                    "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}],
                    "display-lg-mobile": ["36px", {"lineHeight": "44px", "letterSpacing": "-0.02em", "fontWeight": "700"}]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .fill-icon {
            font-variation-settings: 'FILL' 1;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        .mask-overlay {
            background: rgba(0, 0, 0, 0.45);
            backdrop-filter: blur(4px);
        }
        .verdant-shadow {
            box-shadow: 0 10px 40px -10px rgba(17, 153, 142, 0.15);
        }
        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }
        .animate-slide-up {
            animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface font-body-md text-on-surface min-h-screen overflow-hidden">
<!-- Background Content Canvas (Simulated Home Screen) -->
<main class="relative h-screen w-full flex flex-col p-container-padding-mobile">
<header class="flex justify-between items-center h-16 mb-stack-lg">
<h1 class="font-headline-md text-headline-md text-primary">百淘云</h1>
<div class="w-10 h-10 rounded-full bg-surface-container-highest flex items-center justify-center">
<span class="material-symbols-outlined text-on-surface-variant">person</span>
</div>
</header>
<section class="space-y-stack-md">
<div class="p-stack-md rounded-lg bg-surface-container-lowest verdant-shadow border border-white">
<p class="text-on-surface-variant mb-unit font-label-sm">今日饮水量</p>
<div class="flex items-end gap-2">
<span class="text-display-lg-mobile font-display-lg-mobile text-primary">1,250</span>
<span class="text-on-surface-variant font-body-md mb-2">ml / 2,000ml</span>
</div>
<div class="w-full h-3 bg-surface-container-high rounded-full mt-stack-sm overflow-hidden">
<div class="h-full bg-gradient-to-r from-primary to-secondary w-[62%] rounded-full"></div>
</div>
</div>
<div class="grid grid-cols-2 gap-gutter">
<div class="p-stack-md rounded-lg bg-surface-container-lowest verdant-shadow border border-white">
<span class="material-symbols-outlined text-tertiary mb-2 fill-icon">local_cafe</span>
<p class="font-label-sm text-on-surface-variant">咖啡</p>
<p class="font-headline-md text-headline-md">350ml</p>
</div>
<div class="p-stack-md rounded-lg bg-surface-container-lowest verdant-shadow border border-white">
<span class="material-symbols-outlined text-secondary mb-2 fill-icon">water_full</span>
<p class="font-label-sm text-on-surface-variant">纯净水</p>
<p class="font-headline-md text-headline-md">900ml</p>
</div>
</div>
</section>
</main>
<!-- Bottom-Up Modal Overlay -->
<div class="fixed inset-0 z-[60] mask-overlay opacity-0 pointer-events-none transition-opacity duration-300 flex flex-col justify-end" id="modal-mask">
<!-- White Bottom Panel -->
<div class="glass-panel w-full rounded-t-[24px] px-container-padding-mobile pt-10 pb-20 animate-slide-up relative" id="modal-panel">
<div class="max-w-md mx-auto">
<h2 class="text-center font-headline-md text-headline-md mb-stack-lg text-on-surface">添加饮品记录</h2>
<div class="flex justify-around items-center gap-stack-md mb-stack-lg">
<!-- Option 1: Camera -->
<button class="flex flex-col items-center group active:scale-95 transition-transform">
<div class="w-[56px] h-[56px] rounded-full bg-primary-container text-on-primary-container flex items-center justify-center mb-stack-sm shadow-lg group-hover:bg-primary transition-colors">
<span class="material-symbols-outlined text-[28px]">photo_camera</span>
</div>
<span class="font-body-md text-on-surface">拍照</span>
</button>
<!-- Option 2: Gallery -->
<button class="flex flex-col items-center group active:scale-95 transition-transform">
<div class="w-[56px] h-[56px] rounded-full bg-secondary-container/30 text-on-secondary-container flex items-center justify-center mb-stack-sm shadow-md group-hover:bg-secondary-container/50 transition-colors">
<span class="material-symbols-outlined text-[28px]">image</span>
</div>
<span class="font-body-md text-on-surface">从相册上传</span>
</button>
</div>
<!-- Bento Style Secondary Options -->
<div class="bg-surface-container-low rounded-lg p-stack-md border border-white/50 mb-stack-md">
<p class="text-on-surface-variant font-label-sm mb-stack-sm">常用记录</p>
<div class="flex flex-wrap gap-2">
<span class="px-4 py-2 bg-white rounded-full text-label-sm text-primary border border-primary/10 verdant-shadow cursor-pointer">晨间咖啡 250ml</span>
<span class="px-4 py-2 bg-white rounded-full text-label-sm text-primary border border-primary/10 verdant-shadow cursor-pointer">午后绿茶 300ml</span>
</div>
</div>
</div>
<!-- Close Button Container (Relative to panel but visually at bottom) -->
<div class="absolute -bottom-10 left-0 right-0 flex justify-center">
<button class="w-16 h-16 rounded-full bg-inverse-surface text-inverse-on-surface flex items-center justify-center shadow-xl active:scale-90 transition-all hover:bg-on-background" id="close-modal">
<span class="material-symbols-outlined text-[32px]">close</span>
</button>
</div>
</div>
</div>
<!-- Static Floating Action Button to trigger modal -->
<button class="fixed bottom-24 right-6 w-14 h-14 rounded-full bg-primary text-on-primary flex items-center justify-center shadow-2xl z-40 active:scale-90 transition-transform" id="open-modal">
<span class="material-symbols-outlined text-[28px]">add</span>
</button>
<!-- Bottom Navigation Bar (Visual Only) -->
<nav class="fixed bottom-0 w-full h-20 glass-panel border-t border-white/30 flex justify-around items-center px-4 z-50">
<div class="flex flex-col items-center text-primary font-bold bg-secondary-container/30 rounded-xl px-4 py-1">
<span class="material-symbols-outlined fill-icon">home</span>
<span class="text-label-sm font-label-sm">首页</span>
</div>
<div class="flex flex-col items-center text-on-surface-variant">
<span class="material-symbols-outlined">equalizer</span>
<span class="text-label-sm font-label-sm">统计</span>
</div>
<div class="flex flex-col items-center text-on-surface-variant">
<span class="material-symbols-outlined">auto_awesome</span>
<span class="text-label-sm font-label-sm">分析</span>
</div>
<div class="flex flex-col items-center text-on-surface-variant">
<span class="material-symbols-outlined">person</span>
<span class="text-label-sm font-label-sm">我的</span>
</div>
</nav>
<script>
        const openBtn = document.getElementById('open-modal');
        const closeBtn = document.getElementById('close-modal');
        const mask = document.getElementById('modal-mask');
        const panel = document.getElementById('modal-panel');

        function toggleModal(show) {
            if (show) {
                mask.classList.remove('pointer-events-none');
                mask.classList.add('opacity-100');
                panel.classList.remove('translate-y-full');
                panel.classList.add('animate-slide-up');
            } else {
                mask.classList.add('opacity-0');
                mask.classList.add('pointer-events-none');
                mask.classList.remove('opacity-100');
                // Allow CSS transition then fully hide
            }
        }

        openBtn.addEventListener('click', () => toggleModal(true));
        closeBtn.addEventListener('click', () => toggleModal(false));
        mask.addEventListener('click', (e) => {
            if (e.target === mask) toggleModal(false);
        });

        // Initialize state
        toggleModal(true); // Automatically show on load as requested
    </script>
</body></html>
